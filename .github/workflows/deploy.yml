name: Build and deploy site

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Allow the deploy job to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Run JavaScript actions on Node 24. The Node 20 runtime these actions ship with is being
# removed from GitHub runners; this opts every JS action in the workflow into Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# One deploy at a time; do not cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build with Jekyll
        run: bundle exec jekyll build --trace
        env:
          JEKYLL_ENV: production

      # Fail the build on a broken internal link, image, or script reference
      # (e.g. a typo'd path, or assets/js/*.js accidentally excluded again).
      # External URLs (DOIs, Scholar, ORCID) are not checked here -- they are
      # slow/flaky in CI and verified separately.
      - name: Check internal links and images
        run: |
          gem install html-proofer --no-document
          htmlproofer _site \
            --disable-external \
            --ignore-empty-alt \
            --allow-hash-href \
            --no-enforce-https

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # Deploy only from main, so pushes to dev verify the build without publishing.
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
