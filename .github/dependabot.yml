# Dependabot keeps the CI action versions and Ruby gems patched.
# github-actions works immediately; bundler proposes Gemfile updates (and lockfile
# bumps once a Gemfile.lock is committed).
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
