<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
{%- include head.html -%}
<body>
  {%- include header.html -%}
  <main id="main" class="site-main">
    {{ content }}
  </main>
  {%- include footer.html -%}
  <script src="{{ '/assets/js/nav.js' | relative_url }}" defer></script>
  {%- for s in page.scripts -%}
  <script src="{{ '/assets/js/' | append: s | append: '.js' | relative_url }}" defer></script>
  {%- endfor -%}
</body>
</html>
