# people.yml
# ---------------------------------------------------------------------------
# Everyone in the lab, current members and alumni, in ONE file.
#
# `status` decides which page they appear on and nothing else:
#     status: current   -> shown on the Members page (/members/)
#     status: alumni    -> shown on the Alumni page  (/alumni/)
# When someone graduates, change ONLY their `status` from current to alumni.
# Their personal page URL stays /people/<slug>/ forever, so no link ever breaks
# (the old /members/<slug>/ and /alumni/<slug>/ addresses keep redirecting here).
#
# Required: name, role, status.  Everything else is optional (photo, email,
# slug, joined, department, github/linkedin/scholar/orcid/website, note,
# author_aliases, publications). `photo_hover` is an optional second photo that
# crossfades in when you hover the card photo (pointer devices only); leave it
# out for the usual single photo. `department` is the person's own school/dept
# (e.g. a UROP from another department); it shows on a line under the lab
# affiliation, and is omitted entirely when not set. See CONTRIBUTING.md.
# ---------------------------------------------------------------------------
