# themes.yml
# ---------------------------------------------------------------------------
# The research-topic tags used on the Publications page (the filter chips and the
# colored tags on each paper). This is the single place to edit them.
#
# HOW TO EDIT (no coding needed, edit this file on GitHub):
#   - Reorder:  move a block up/down; the filter chips follow this order.
#   - Rename:   change `name`. IMPORTANT: also update that name in every paper's
#               `themes:` in publications.yml (they must match exactly). The build
#               will fail with a clear message if a paper uses a name not listed here.
#   - Recolor:  change `color` to any hex value. Use a reasonably dark color so the
#               tag text stays readable on its light background.
#   - Add:      copy a block, give it a new name + color. Then tag papers with it.
#   - Remove:   delete a block (after removing that name from every paper).
#
# FIELDS
#   name   REQUIRED. The label shown on the chip and the tag.
#   color  REQUIRED. Hex color, e.g. "#1864ab".
# ---------------------------------------------------------------------------
- name: Spectroscopic analysis
  color: "#D62728"
- name: Quantum chemical modeling
  color: "#F3943E"
- name: Reaction pathway prediction
  color: "#004F9E"
- name: Molecular property prediction
  color: "#08A470"
- name: Representation learning
  color: "#5E4B8B"   
- name: Generative modeling
  color: "#4EBBE5"
- name: Experimental dataset
  color: "#6E6E6E"
