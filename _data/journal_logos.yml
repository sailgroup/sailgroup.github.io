# journal_logos.yml
# ---------------------------------------------------------------------------
# Maps each journal name used in publications.yml to its logo file in
# assets/images/journals/. Keys MUST match the `journal:` string exactly
# (this is a hash lookup). Logos supplied by the PI (Journal Logos folder).
