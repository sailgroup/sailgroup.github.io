bio: >-
  Joonyoung F. Joung is an Assistant Professor in the Department of Chemistry 
  at Kookmin University. He completed his Ph.D. in physical chemistry
  at Korea University with Sungnam Park, then worked as a postdoctoral research
  associate at Korea University and as a postdoctoral associate in the Department
  of Chemical Engineering at MIT with Connor W. Coley. His work combines
  spectroscopy, physical chemistry, and machine learning for molecular property
  prediction, reaction prediction, and molecular design.

