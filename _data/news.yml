# news.yml
# ---------------------------------------------------------------------------
# SAIL news feed, shown on the News page (/news/), newest first.
#
# HOW TO ADD AN ITEM (no coding needed, edit this file on GitHub):
#   1. Copy one block below (from "- date:" down to the blank line).
#   2. Paste it anywhere in the list and fill in the fields. Order does not
#      matter: the page always sorts by date, newest first.
#   3. Commit. The site rebuilds and the item appears automatically.
#
# FIELDS
#   date         REQUIRED. "YYYY-MM-DD". Controls the order (newest first).
#                If you only know the month or year, use 01 for the missing
#                part and set display_date so the guess is not shown.
#   display_date OPTIONAL. Shown in place of date when set, e.g. "March 2025"
#                or "2026". Leave "" to show the full date.
#   category     one of: people | publication | award | talk | event
#   title        REQUIRED. One line.
#   body         OPTIONAL. A sentence or two of detail. Leave "" to omit.
#   link         OPTIONAL. A page on this site ("/publications/41/") or a full
#                URL ("https://..."). Full URLs open in a new tab.
#   link_text    OPTIONAL. Link label. Defaults to "Details".
# ---------------------------------------------------------------------------

