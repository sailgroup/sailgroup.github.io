# Current members. Source: live lab site, extracted Phase 0. Exactly as listed;
# no invented bios, interests, or links. Photos staged in _source/images and copied
# to assets/images during build. Ordered by role, then join date.
#
# Optional per-member fields (add only with a real, verified URL; never invent one).
# They render as logo icons beside the email on the member page:
#   linkedin: https://www.linkedin.com/in/...
#   github:   https://github.com/...
#   scholar:  https://scholar.google.com/citations?user=...
#   orcid:    https://orcid.org/0000-0000-0000-0000
#   website:  https://...
# author_aliases: ["Name Variant"]   # extra strings to match against publications.yml authors
#
# Optional: a member's own papers from elsewhere (NOT on the lab Publications
# page, e.g. from a previous position). They show on the member's page, merged
# with any lab papers matching their name, newest first. The title links to the
# DOI; the member's own name is bold.
#   publications:
#     - title:   "Paper title"
#       authors: "A. Member, B. Coauthor"
#       journal: "J. Whatever"
#       year:    2023                          # plain number, no quotes
#       doi:     "https://doi.org/10.xxxx/yyy"  # optional; the title links here
#       preprint_url: "https://arxiv.org/abs/..." # optional
