# --- Site identity ---------------------------------------------------------
title: Spectroscopy and AI Lab
short_name: SAIL
tagline: SAIL at Kookmin University
description: >-
  SAIL (Spectroscopy and AI Lab) at Kookmin University, led by Joonyoung F.
  Joung. We develop machine learning methods for molecular property prediction,
  chemical reaction prediction, de novo molecular design, and chemical databases.
url: "https://sail.kookmin.ac.kr"
baseurl: ""
lang: en
timezone: Asia/Seoul
logo: /assets/images/sail-logo.png

# --- Build -----------------------------------------------------------------
markdown: kramdown
permalink: pretty
sass:
  style: compressed

# Member, alumni, and publication detail pages are generated from _data/*.yml by
# _plugins/generate_pages.rb (one YAML entry = one page; no collection stubs).

defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/og-image.png

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - _source/
  - vendor/
  - node_modules/
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - README.md
  - CLAUDE.md
  - DECISIONS.md
  - PROGRESS.md
  - CONTENT_INVENTORY.md
  - REVIEW.md
  - REFACTOR_PLAN.md
  - CONTRIBUTING.md
  # Do NOT add blanket globs like "*.js" or "*.ps1" here: Jekyll matches them against
  # nested paths too, which silently dropped assets/js/*.js from the build and broke the
  # publication filter, mobile nav, and photo lightbox. Root-level one-off helper scripts
  # are kept out of the repo via .gitignore instead, so they never reach the CI build.

# --- SEO --------------------------------------------------------------------
twitter:
  card: summary_large_image
author:
  name: Joonyoung F. Joung
social:
  name: Spectroscopy and AI Lab
  links:
    - https://scholar.google.com/citations?user=0uuwTRQAAAAJ
    - https://orcid.org/0000-0002-5976-2048
